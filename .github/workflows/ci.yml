name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }}, extras=${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        extras:
          - "test"          # core only — confirms cryptography is truly optional
          - "test,audit"    # signing path enabled
          - "test,scipy"    # SciPy-gated baseline parity test enabled

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"

      - name: Show installed versions
        run: |
          python --version
          pip list

      - name: Run pytest
        run: pytest -q --tb=short
